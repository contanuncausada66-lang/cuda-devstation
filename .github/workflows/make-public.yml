name: Make Package Public

on:
  workflow_dispatch:

jobs:
  public:
    runs-on: ubuntu-24.04
    permissions:
      packages: read
      contents: read
    steps:
      - name: List user packages
        run: |
          set -x
          echo "=== List container packages ==="
          gh api "/user/packages?package_type=container" --jq '.[] | {name: .name, visibility: .visibility, url: .url}' 2>&1 || true

          echo "=== List all user packages ==="
          gh api "/user/packages" --jq '.[] | {name: .name, package_type: .package_type, visibility: .visibility}' 2>&1 || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
