name: Make Package Public

on:
  workflow_dispatch:

jobs:
  public:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Make package public
        run: |
          set -x
          echo "=== Trying PATCH /user/packages/container/cuda-devstation/visibility ==="
          gh api --method PATCH \
            /user/packages/container/cuda-devstation/visibility \
            -F visibility=public \
            --verbose 2>&1

          echo "=== Trying with query param ==="
          gh api --method PATCH \
            "/user/packages/container/cuda-devstation?visibility=public" \
            --verbose 2>&1

          echo "=== Trying via orgs (user) ==="
          gh api --method PATCH \
            "/users/contanuncausada66-lang/packages/container/cuda-devstation/visibility" \
            -F visibility=public \
            --verbose 2>&1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
