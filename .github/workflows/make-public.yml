name: Make Package Public

on:
  workflow_dispatch:

jobs:
  public:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Make package public
        run: |
          gh api --method PATCH \
            /user/packages/container/cuda-devstation \
            -f visibility=public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
