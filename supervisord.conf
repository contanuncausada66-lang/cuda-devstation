[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
loglevel=info

[program:dbus]
command=dbus-daemon --system --fork
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:vnc]
command=vncserver :1 -geometry 1920x1080 -depth 24 -localhost no -SecurityTypes None
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
user=root
environment=DISPLAY=:1,USER=root,HOME=/root

[program:novnc]
command=websockify --web /opt/novnc 6080 localhost:5901
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:codeserver]
command=bash -c "mkdir -p /root/workspace && printf 'bind-addr: 127.0.0.1:8081\nauth: password\npassword: %s\ncert: false\n' \"${CODE_PASSWORD:-admin123}\" > /root/.config/code-server/config.yaml && exec code-server --bind-addr 127.0.0.1:8081 --auth password /root/workspace"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
user=root
directory=/root

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
priority=999
