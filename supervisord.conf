[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
loglevel=info

[program:dbus]
command=dbus-daemon --session --nofork --nopidfile --syslog
autostart=true
autorestart=true
startsecs=1
startretries=5
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0

[program:vnc]
command=Xtigervnc :1 -geometry 1920x1080 -depth 24 -localhost no -SecurityTypes None -fg -xstartup /root/.vnc/xstartup
autostart=true
autorestart=true
startsecs=2
startretries=5
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
user=root
environment=DISPLAY=:1,USER=root,HOME=/root

[program:novnc]
command=websockify --web /opt/novnc 6080 localhost:5901
autostart=true
autorestart=true
startsecs=1
startretries=5
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0

[program:codeserver]
command=code-server --bind-addr 127.0.0.1:8081 --config /root/.config/code-server/config.yaml /root/workspace
autostart=true
autorestart=true
startsecs=2
startretries=5
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
user=root
directory=/root

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
startsecs=1
startretries=5
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
priority=999
